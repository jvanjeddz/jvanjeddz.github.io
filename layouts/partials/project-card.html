<a href="{{ .link }}" target="_blank">
    <div class="project-card">
        <img src="{{ .image }}" alt="{{ .title }}" />
        <div class="project-overlay"></div>
        <p class="project-title">{{ .title }}</p>
    </div>
    {{ with .description }}
    <p class="project-description">{{ . }}</p>
    {{ end }}
</a>
